<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三轮车智能监控中心</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #0a0e27;
            color: #e0e6ed;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        
        /* 顶部导航 */
        .header {
            background: linear-gradient(135deg, #1a1f3a 0%, #0f1729 100%);
            border: 1px solid #2a3f5f;
            border-radius: 12px;
            padding: 25px 35px;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #ff6b35, #f7931e, #ff6b35);
            animation: shimmer 3s infinite;
        }
        
        @keyframes shimmer {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: #ffffff;
            font-size: 28px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 20px #00ff88;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }
        
        .header-info {
            display: flex;
            gap: 30px;
            align-items: center;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        
        .info-label {
            font-size: 11px;
            color: #8b95a5;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .info-value {
            font-size: 16px;
            color: #00ff88;
            font-weight: 600;
            margin-top: 2px;
        }
        
        /* 统计卡片网格 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #1a1f3a 0%, #0f1729 100%);
            border: 1px solid #2a3f5f;
            border-radius: 12px;
            padding: 25px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #ff6b35;
            box-shadow: 0 12px 40px rgba(255, 107, 53, 0.2);
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #ff6b35, #f7931e);
        }
        
        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .stat-icon {
            font-size: 32px;
            opacity: 0.8;
        }
        
        .stat-trend {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 600;
        }
        
        .trend-up {
            background: rgba(0, 255, 136, 0.15);
            color: #00ff88;
        }
        
        .stat-label {
            font-size: 13px;
            color: #8b95a5;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1;
        }
        
        .stat-unit {
            font-size: 16px;
            color: #8b95a5;
            margin-left: 8px;
        }
        
        /* 图表区域 */
        .charts-section {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 25px;
            margin-bottom: 25px;
        }
        
        .chart-container {
            background: linear-gradient(135deg, #1a1f3a 0%, #0f1729 100%);
            border: 1px solid #2a3f5f;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        
        .chart-title {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .chart-badge {
            background: rgba(255, 107, 53, 0.15);
            color: #ff6b35;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        /* 主要内容区域 */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 25px;
        }
        
        .section {
            background: linear-gradient(135deg, #1a1f3a 0%, #0f1729 100%);
            border: 1px solid #2a3f5f;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #2a3f5f;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-badge {
            background: rgba(255, 107, 53, 0.15);
            color: #ff6b35;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        /* 区域排行 */
        .region-list {
            display: grid;
            gap: 15px;
        }
        
        .region-item {
            background: rgba(42, 63, 95, 0.3);
            border: 1px solid #2a3f5f;
            border-radius: 8px;
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
        }
        
        .region-item:hover {
            background: rgba(42, 63, 95, 0.5);
            border-color: #ff6b35;
        }
        
        .region-rank {
            font-size: 28px;
            font-weight: 700;
            min-width: 50px;
            text-align: center;
        }
        
        .rank-1 { color: #ffd700; text-shadow: 0 0 20px #ffd700; }
        .rank-2 { color: #c0c0c0; text-shadow: 0 0 20px #c0c0c0; }
        .rank-3 { color: #cd7f32; text-shadow: 0 0 20px #cd7f32; }
        .rank-other { color: #8b95a5; }
        
        .region-info {
            flex: 1;
        }
        
        .region-name {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 8px;
        }
        
        .region-bar {
            height: 6px;
            background: rgba(42, 63, 95, 0.5);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .region-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b35, #f7931e);
            border-radius: 3px;
            transition: width 1s ease;
        }
        
        .region-stats {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
        }
        
        .region-value {
            font-size: 24px;
            font-weight: 700;
            color: #ff6b35;
        }
        
        .region-percent {
            font-size: 12px;
            color: #8b95a5;
        }
        
        /* 客户排行 */
        .customer-list {
            display: grid;
            gap: 12px;
        }
        
        .customer-item {
            background: rgba(42, 63, 95, 0.3);
            border: 1px solid #2a3f5f;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
        }
        
        .customer-item:hover {
            background: rgba(42, 63, 95, 0.5);
            border-color: #00ff88;
        }
        
        .customer-rank {
            font-size: 16px;
            font-weight: 700;
            color: #ff6b35;
            min-width: 30px;
            text-align: center;
        }
        
        .customer-info {
            flex: 1;
        }
        
        .customer-name {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 4px;
        }
        
        .customer-region {
            font-size: 11px;
            color: #8b95a5;
            text-transform: uppercase;
        }
        
        .customer-value {
            font-size: 18px;
            font-weight: 700;
            color: #00ff88;
        }
        
        /* 控制按钮 */
        .controls {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        
        .btn {
            flex: 1;
            padding: 14px 24px;
            border: 1px solid #2a3f5f;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            color: #ffffff;
            border: none;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 107, 53, 0.4);
        }
        
        .btn-secondary {
            background: rgba(42, 63, 95, 0.3);
            color: #8b95a5;
        }
        
        .btn-secondary:hover {
            background: rgba(42, 63, 95, 0.5);
            color: #ffffff;
            border-color: #ff6b35;
        }
        
        /* 响应式 */
        @media (max-width: 1200px) {
            .charts-section {
                grid-template-columns: 1fr;
            }
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部导航 -->
        <div class="header">
            <div class="header-content">
                <h1>
                    <div class="status-indicator"></div>
                    三轮车智能监控中心
                </h1>
                <div class="header-info">
                    <div class="info-item">
                        <div class="info-label">系统状态</div>
                        <div class="info-value">运行中</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">最后更新</div>
                        <div class="info-value" id="lastUpdate">--:--</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 统计卡片 -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon">📈</div>
                    <div class="stat-trend trend-up">↑ 15%</div>
                </div>
                <div class="stat-label">总销量</div>
                <div class="stat-value">--<span class="stat-unit">台</span></div>
            </div>
        </div>
        
        <!-- 图表区域 -->
        <div class="charts-section">
            <!-- 区域销量柱状图 -->
            <div class="chart-container">
                <div class="chart-title">
                    📊 区域销量分析
                    <div class="chart-badge">柱状图</div>
                </div>
                <canvas id="regionChart"></canvas>
            </div>
            
            <!-- 客户销量柱状图 -->
            <div class="chart-container">
                <div class="chart-title">
                    👥 TOP 客户
                    <div class="chart-badge">TOP 5</div>
                </div>
                <canvas id="customerChart"></canvas>
            </div>
        </div>
        
        <!-- 主要内容 -->
        <div class="main-content">
            <!-- 区域排行 -->
            <div class="section">
                <div class="section-header">
                    <div class="section-title">
                        🏆 区域销量排行
                    </div>
                    <div class="section-badge">实时</div>
                </div>
                <div class="region-list" id="regionList"></div>
            </div>
            
            <!-- 客户排行 -->
            <div class="section">
                <div class="section-header">
                    <div class="section-title">
                        ⭐ TOP 客户
                    </div>
                    <div class="section-badge">TOP 10</div>
                </div>
                <div class="customer-list" id="customerList"></div>
            </div>
        </div>
        
        <!-- 控制按钮 -->
        <div class="controls">
            <button class="btn btn-primary" onclick="loadData()">
                🔄 刷新数据
            </button>
            <button class="btn btn-secondary" onclick="window.location.href='/upload'">
                📤 上传报表
            </button>
        </div>
    </div>
    
    <script>
        let regionChart = null;
        let customerChart = null;
        
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('lastUpdate').textContent = timeStr;
        }
        
        async function loadData() {
            try {
                const response = await fetch('/api/dashboard/stats');
                const data = await response.json();
                
                updateStatsCards(data);
                updateCharts(data);
                updateRegionList(data.regions, data.total_sales);
                updateCustomerList(data.customers);
                updateTime();
                
            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }
        
        function updateStatsCards(data) {
            const html = `
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon">📈</div>
                        <div class="stat-trend trend-up">↑ 15%</div>
                    </div>
                    <div class="stat-label">总销量</div>
                    <div class="stat-value">${data.total_sales.toLocaleString()}<span class="stat-unit">台</span></div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon">🏢</div>
                        <div class="stat-trend trend-up">↑ 2</div>
                    </div>
                    <div class="stat-label">覆盖区域</div>
                    <div class="stat-value">${data.region_count}<span class="stat-unit">个</span></div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon">👥</div>
                        <div class="stat-trend trend-up">↑ 8%</div>
                    </div>
                    <div class="stat-label">活跃客户</div>
                    <div class="stat-value">${data.customer_count}<span class="stat-unit">家</span></div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon">💰</div>
                        <div class="stat-trend trend-up">↑ 12%</div>
                    </div>
                    <div class="stat-label">总金额</div>
                    <div class="stat-value">${(data.total_amount / 10000).toFixed(1)}<span class="stat-unit">万</span></div>
                </div>
            `;
            document.getElementById('statsGrid').innerHTML = html;
        }
        
        function updateCharts(data) {
            // 区域销量柱状图
            const regionLabels = data.regions.map(r => r.region);
            const regionValues = data.regions.map(r => r.total_quantity);
            
            if (regionChart) {
                regionChart.destroy();
            }
            
            const regionCtx = document.getElementById('regionChart').getContext('2d');
            regionChart = new Chart(regionCtx, {
                type: 'bar',
                data: {
                    labels: regionLabels,
                    datasets: [{
                        label: '销量（台）',
                        data: regionValues,
                        backgroundColor: 'rgba(255, 107, 53, 0.8)',
                        borderColor: 'rgba(255, 107, 53, 1)',
                        borderWidth: 2,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    aspectRatio: 2,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: 'rgba(26, 31, 58, 0.95)',
                            titleColor: '#ffffff',
                            bodyColor: '#e0e6ed',
                            borderColor: '#2a3f5f',
                            borderWidth: 1,
                            padding: 12,
                            displayColors: false,
                            callbacks: {
                                label: function(context) {
                                    return '销量: ' + context.parsed.y + ' 台';
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(42, 63, 95, 0.3)'
                            },
                            ticks: {
                                color: '#8b95a5'
                            }
                        },
                        x: {
                            grid: {
                                display: false
                            },
                            ticks: {
                                color: '#8b95a5'
                            }
                        }
                    }
                }
            });
            
            // 客户销量柱状图（TOP 5）
            const customerLabels = data.customers.slice(0, 5).map(c => c.customer.split('-')[1] || c.customer);
            const customerValues = data.customers.slice(0, 5).map(c => c.total_quantity);
            
            if (customerChart) {
                customerChart.destroy();
            }
            
            const customerCtx = document.getElementById('customerChart').getContext('2d');
            customerChart = new Chart(customerCtx, {
                type: 'bar',
                data: {
                    labels: customerLabels,
                    datasets: [{
                        label: '销量（台）',
                        data: customerValues,
                        backgroundColor: 'rgba(0, 255, 136, 0.8)',
                        borderColor: 'rgba(0, 255, 136, 1)',
                        borderWidth: 2,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    aspectRatio: 1,
                    indexAxis: 'y',
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: 'rgba(26, 31, 58, 0.95)',
                            titleColor: '#ffffff',
                            bodyColor: '#e0e6ed',
                            borderColor: '#2a3f5f',
                            borderWidth: 1,
                            padding: 12,
                            displayColors: false,
                            callbacks: {
                                label: function(context) {
                                    return '销量: ' + context.parsed.x + ' 台';
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(42, 63, 95, 0.3)'
                            },
                            ticks: {
                                color: '#8b95a5'
                            }
                        },
                        y: {
                            grid: {
                                display: false
                            },
                            ticks: {
                                color: '#8b95a5'
                            }
                        }
                    }
                }
            });
        }
        
        function updateRegionList(regions, total) {
            const rankClass = ['rank-1', 'rank-2', 'rank-3', 'rank-other', 'rank-other'];
            const rankEmoji = ['🥇', '🥈', '🥉', '4', '5'];
            
            const html = regions.map((r, i) => {
                const percent = ((r.total_quantity / total) * 100).toFixed(1);
                return `
                    <div class="region-item">
                        <div class="region-rank ${rankClass[i]}">${rankEmoji[i]}</div>
                        <div class="region-info">
                            <div class="region-name">${r.region}</div>
                            <div class="region-bar">
                                <div class="region-bar-fill" style="width: ${percent}%"></div>
                            </div>
                        </div>
                        <div class="region-stats">
                            <div class="region-value">${r.total_quantity}</div>
                            <div class="region-percent">${percent}%</div>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('regionList').innerHTML = html;
        }
        
        function updateCustomerList(customers) {
            const html = customers.map((c, i) => `
                <div class="customer-item">
                    <div class="customer-rank">${i + 1}</div>
                    <div class="customer-info">
                        <div class="customer-name">${c.customer}</div>
                        <div class="customer-region">${c.region}</div>
                    </div>
                    <div class="customer-value">${c.total_quantity}</div>
                </div>
            `).join('');
            document.getElementById('customerList').innerHTML = html;
        }
        
        // 页面加载时获取数据
        loadData();
        
        // 每30秒自动刷新
        setInterval(loadData, 30000);
        
        // 每秒更新时间
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
